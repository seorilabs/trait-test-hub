# GitHub Pages 배포 전용 워크플로우.
# 정적 품질 체크(pnpm check)는 static-checks.yml(org 재사용 caller)로 분리했고,
# 여기서는 Pages 빌드 + 배포만 수행한다. org에 RN web-Pages 재사용 워크플로우가 없어 인라인 잡을 유지한다.
# public repo이므로 빌드/배포 모두 self-hosted(ARC)가 아닌 ubuntu-latest로 라우팅한다.
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ github.event.repository.private && 'seorilabs-rpi-arm64' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          check-latest: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Pages artifact
        run: pnpm build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-dist
          retention-days: 3

  deploy:
    needs: build
    runs-on: ${{ github.event.repository.private && 'seorilabs-rpi-arm64' || 'ubuntu-latest' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
