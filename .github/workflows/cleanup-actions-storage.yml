name: Cleanup GitHub Actions Storage

on:
  workflow_dispatch:
    inputs:
      delete_artifacts:
        description: "Delete workflow artifacts."
        required: false
        default: true
        type: boolean
      delete_caches:
        description: "Delete Actions caches."
        required: false
        default: true
        type: boolean
      dry_run:
        description: "Print targets without deleting them."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 18 * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: cleanup-actions-storage
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete Actions artifacts and caches
    runs-on: ${{ github.event.repository.private && 'seorilabs-rpi-arm64' || 'ubuntu-latest' }}
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      DELETE_ARTIFACTS: ${{ github.event_name != 'workflow_dispatch' || inputs.delete_artifacts }}
      DELETE_CACHES: ${{ github.event_name != 'workflow_dispatch' || inputs.delete_caches }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

    steps:
      - name: Delete workflow artifacts
        if: env.DELETE_ARTIFACTS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          rows="$(gh api --paginate "repos/$GH_REPO/actions/artifacts?per_page=100" --jq '.artifacts[] | [.id, .size_in_bytes, .name] | @tsv')"
          if [ -z "$rows" ]; then
            echo "No workflow artifacts found."
            exit 0
          fi

          count="$(printf '%s\n' "$rows" | awk 'NF { count += 1 } END { print count + 0 }')"
          bytes="$(printf '%s\n' "$rows" | awk -F '\t' '{ sum += $2 } END { print sum + 0 }')"
          echo "Found $count workflow artifacts using $bytes bytes."

          deleted=0
          while IFS=$'\t' read -r artifact_id artifact_size artifact_name; do
            [ -n "${artifact_id:-}" ] || continue
            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry-run] artifact #$artifact_id $artifact_name ($artifact_size bytes)"
            else
              echo "Deleting artifact #$artifact_id $artifact_name ($artifact_size bytes)"
              gh api --method DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id" >/dev/null
            fi
            deleted=$((deleted + 1))
          done <<< "$rows"

          {
            echo "### Workflow artifacts"
            echo ""
            echo "- candidates: $count"
            echo "- bytes: $bytes"
            echo "- processed: $deleted"
            echo "- dry_run: $DRY_RUN"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete Actions caches
        if: env.DELETE_CACHES == 'true'
        shell: bash
        run: |
          set -euo pipefail

          rows="$(gh api --paginate "repos/$GH_REPO/actions/caches?per_page=100" --jq '.actions_caches[] | [.id, .size_in_bytes, .key] | @tsv')"
          if [ -z "$rows" ]; then
            echo "No Actions caches found."
            exit 0
          fi

          count="$(printf '%s\n' "$rows" | awk 'NF { count += 1 } END { print count + 0 }')"
          bytes="$(printf '%s\n' "$rows" | awk -F '\t' '{ sum += $2 } END { print sum + 0 }')"
          echo "Found $count Actions caches using $bytes bytes."

          deleted=0
          while IFS=$'\t' read -r cache_id cache_size cache_key; do
            [ -n "${cache_id:-}" ] || continue
            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry-run] cache #$cache_id $cache_key ($cache_size bytes)"
            else
              echo "Deleting cache #$cache_id $cache_key ($cache_size bytes)"
              gh api --method DELETE "repos/$GH_REPO/actions/caches/$cache_id" >/dev/null
            fi
            deleted=$((deleted + 1))
          done <<< "$rows"

          {
            echo "### Actions caches"
            echo ""
            echo "- candidates: $count"
            echo "- bytes: $bytes"
            echo "- processed: $deleted"
            echo "- dry_run: $DRY_RUN"
          } >> "$GITHUB_STEP_SUMMARY"
